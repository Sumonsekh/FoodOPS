<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodOPS Inventory</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#111;
            color:white;
            display:flex;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#1a1a1a;
            padding:30px 20px;
            position:fixed;
        }

        .sidebar h2{
            color:orange;
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px;
            margin-bottom:10px;
            border-radius:8px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:orange;
        }

        .main{
            margin-left:250px;
            width:100%;
            padding:30px;
        }

        .main h1{
            color:orange;
            margin-bottom:30px;
        }

        .inventory-form{
            background:#1f1f1f;
            padding:30px;
            border-radius:15px;
            margin-bottom:40px;
        }

        .inventory-form h2{
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#ccc;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#2b2b2b;
            color:white;
        }

        .btn{
            background:orange;
            color:white;
            border:none;
            padding:15px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }

        .btn:hover{
            background:#ff8800;
        }

        .inventory-table{
            background:#1f1f1f;
            padding:25px;
            border-radius:15px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table th,
        table td{
            padding:15px;
            border-bottom:1px solid #333;
            text-align:left;
        }

        table th{
            color:orange;
        }

        .low-stock{
            color:red;
            font-weight:bold;
        }

        @media(max-width:768px){

            body{
                flex-direction:column;
            }

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
            }

            .main{
                margin-left:0;
            }
        }

    </style>
</head>
<body>

    <div class="sidebar">

        <h2>FoodOPS</h2>

        <a href="dashboard.html">Dashboard</a>
        <a href="sales.html">Sales</a>
        <a href="inventory.html">Inventory</a>
        <a href="employees.html">Employees</a>
        <a href="reports.html">Reports</a>

    </div>

    <div class="main">

        <h1>Inventory Management</h1>

        <div class="inventory-form">

            <h2>Add Inventory</h2>

            <div class="form-group">
                <label>Item Name</label>
                <input type="text" placeholder="Enter item name">
            </div>

            <div class="form-group">
                <label>Opening Stock</label>
                <input type="number" placeholder="Opening stock">
            </div>

            <div class="form-group">
                <label>Received Stock</label>
                <input type="number" placeholder="Received stock">
            </div>

            <div class="form-group">
                <label>Closing Stock</label>
                <input type="number" placeholder="Closing stock">
            </div>

            <button class="btn">Save Inventory</button>

        </div>

        <div class="inventory-table">

            <h2 style="margin-bottom:20px; color:orange;">Stock Report</h2>

            <table>

                <tr>
                    <th>Item</th>
                    <th>Opening</th>
                    <th>Received</th>
                    <th>Closing</th>
                    <th>Status</th>
                </tr>

                <tr>
                    <td>Chicken</td>
                    <td>20 KG</td>
                    <td>10 KG</td>
                    <td>5 KG</td>
                    <td class="low-stock">Low Stock</td>
                </tr>

                <tr>
                    <td>Rice</td>
                    <td>50 KG</td>
                    <td>20 KG</td>
                    <td>25 KG</td>
                    <td>Available</td>
                </tr>

                <tr>
                    <td>Cheese</td>
                    <td>15 KG</td>
                    <td>5 KG</td>
                    <td>2 KG</td>
                    <td class="low-stock">Low Stock</td>
                </tr>

            </table>

        </div>

    </div>

</body>
</html>
