<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodOPS Settings</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#111;
            color:white;
            display:flex;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#1a1a1a;
            padding:30px 20px;
            position:fixed;
        }

        .sidebar h2{
            color:orange;
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px;
            margin-bottom:10px;
            border-radius:8px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:orange;
        }

        .main{
            margin-left:250px;
            width:100%;
            padding:30px;
        }

        .main h1{
            color:orange;
            margin-bottom:30px;
        }

        .settings-box{
            background:#1f1f1f;
            padding:30px;
            border-radius:15px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#ccc;
        }

        input,
        select{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#2b2b2b;
            color:white;
        }

        .btn{
            background:orange;
            color:white;
            border:none;
            padding:15px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }

        .btn:hover{
            background:#ff8800;
        }

        @media(max-width:768px){

            body{
                flex-direction:column;
            }

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
            }

            .main{
                margin-left:0;
            }
        }

    </style>

</head>

<body>

    <div class="sidebar">

        <h2>FoodOPS</h2>

        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="sales.html">Sales</a>
        <a href="inventory.html">Inventory</a>
        <a href="employees.html">Employees</a>
        <a href="reports.html">Reports</a>
        <a href="settings.html">Settings</a>

    </div>

    <div class="main">

        <h1>Settings</h1>

        <div class="settings-box">

            <div class="form-group">
                <label>Restaurant Name</label>
                <input type="text" placeholder="Enter restaurant name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter email address">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" placeholder="Enter phone number">
            </div>

            <div class="form-group">
                <label>Currency</label>

                <select>
                    <option>Indian Rupee (₹)</option>
                    <option>Dollar ($)</option>
                    <option>Euro (€)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Theme</label>

                <select>
                    <option>Dark Mode</option>
                    <option>Light Mode</option>
                </select>
            </div>

            <button class="btn">Save Settings</button>

        </div>

    </div>

</body>
</html>
