<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodOPS Employees</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#111;
            color:white;
            display:flex;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#1a1a1a;
            padding:30px 20px;
            position:fixed;
        }

        .sidebar h2{
            color:orange;
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px;
            margin-bottom:10px;
            border-radius:8px;
        }

        .sidebar a:hover{
            background:orange;
        }

        .main{
            margin-left:250px;
            width:100%;
            padding:30px;
        }

        .main h1{
            color:orange;
            margin-bottom:30px;
        }

        .employee-card{
            background:#1f1f1f;
            padding:25px;
            border-radius:15px;
            margin-bottom:25px;
        }

        .employee-card h2{
            color:orange;
            margin-bottom:10px;
        }

        .employee-card p{
            color:#ccc;
            margin-bottom:8px;
        }

    </style>
</head>

<div class="sidebar">
