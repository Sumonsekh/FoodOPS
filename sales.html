<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FoodOPS Sales</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#111;
            color:white;
            display:flex;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#1a1a1a;
            padding:30px 20px;
            position:fixed;
        }

        .sidebar h2{
            color:orange;
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px;
            margin-bottom:10px;
            border-radius:8px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:orange;
        }

        .main{
            margin-left:250px;
            width:100%;
            padding:30px;
        }

        .main h1{
            color:orange;
            margin-bottom:30px;
        }

        .sales-form{
            background:#1f1f1f;
            padding:30px;
            border-radius:15px;
            margin-bottom:40px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#ccc;
        }

        input,
        select{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#2b2b2b;
            color:white;
        }

        .btn{
            background:orange;
            color:white;
            border:none;
            padding:15px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .btn:hover{
            background:#ff8800;
        }

        .sales-table{
            background:#1f1f1f;
            padding:25px;
            border-radius:15px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table th,
        table td{
            padding:15px;
            border-bottom:1px solid #333;
            text-align:left;
        }

        table th{
            color:orange;
        }

        @media(max-width:768px){

            body{
                flex-direction:column;
            }

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
            }

            .main{
                margin-left:0;
            }
        }

    </style>

</head>

<body>

    <div class="sidebar">

        <h2>FoodOPS</h2>

        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="sales.html">Sales</a>
        <a href="inventory.html">Inventory</a>
        <a href="employees.html">Employees</a>
        <a href="reports.html">Reports</a>
        <a href="settings.html">Settings</a>

    </div>

    <div class="main">

        <h1>Sales Management</h1>

        <div class="sales-form">

            <div class="form-group">
                <label>Item Name</label>

                <input
                type="text"
                id="item"
                placeholder="Enter item name">
            </div>

            <div class="form-group">
                <label>Quantity</label>

                <input
                type="number"
                id="quantity"
                placeholder="Enter quantity">
            </div>

            <div class="form-group">
                <label>Amount</label>

                <input
                type="number"
                id="amount"
                placeholder="Enter amount">
            </div>

            <div class="form-group">

                <label>Payment Mode</label>

                <select id="payment">

                    <option>Cash</option>
                    <option>UPI</option>
                    <option>Card</option>

                </select>

            </div>

            <button
            class="btn"
            onclick="addSale()">

            Add Sale

            </button>

        </div>

        <div class="sales-table">

            <h2 style="margin-bottom:20px; color:orange;">
                Recent Sales
            </h2>

            <table id="salesTable">

                <tr>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Amount</th>
                    <th>Payment</th>
                </tr>

            </table>

        </div>

    </div>

    <script>

        function addSale(){

            let item =
            document.getElementById("item").value;

            let quantity =
            document.getElementById("quantity").value;

            let amount =
            document.getElementById("amount").value;

            let payment =
            document.getElementById("payment").value;

            let table =
            document.getElementById("salesTable");

            let row = table.insertRow();

            row.insertCell(0).innerHTML = item;

            row.insertCell(1).innerHTML = quantity;

            row.insertCell(2).innerHTML =
            "₹" + amount;

            row.insertCell(3).innerHTML =
            payment;

        }

    </script>

</body>
</html>
