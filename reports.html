<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodOPS Reports</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#111;
            color:white;
            display:flex;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#1a1a1a;
            padding:30px 20px;
            position:fixed;
        }

        .sidebar h2{
            color:orange;
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px;
            margin-bottom:10px;
            border-radius:8px;
        }

        .sidebar a:hover{
            background:orange;
        }

        .main{
            margin-left:250px;
            width:100%;
            padding:30px;
        }

        .main h1{
            color:orange;
            margin-bottom:30px;
        }

        .report-box{
            background:#1f1f1f;
            padding:25px;
            border-radius:15px;
            margin-bottom:25px;
        }

        .report-box h2{
            color:orange;
            margin-bottom:15px;
        }

        .report-box p{
            color:#ccc;
            margin-bottom:10px;
        }

        .btn{
            padding:12px 20px;
            background:orange;
            border:none;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

    </style>
</head>
<body>

<div class="sidebar">
    <h2>FoodOPS</h2>

    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="sales.html">Sales</a>
    <a href="inventory.html">Inventory</a>
    <a href="employees.html">Employees</a>
    <a href="reports.html">Reports</a>
</div>

<div class="main">

    <h1>Reports Section</h1>

    <div class="report-box">
        <h2>Daily Sales Report</h2>
        <p>Total Sales: ₹45,000</p>
        <p>Total Orders: 320</p>
        <button class="btn">Download Report</button>
    </div>

    <div class="report-box">
        <h2>Inventory Report</h2>
        <p>Low Stock Items: 5</p>
        <p>Total Inventory Value: ₹80,000</p>
        <button class="btn">Download Report</button>
    </div>

    <div class="report-box">
        <h2>Employee Report</h2>
        <p>Total Employees: 18</p>
        <p>Present Today: 15</p>
        <button class="btn">Download Report</button>
    </div>

</div>

</body>
</html>
